<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Campus — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
  <style>
    body { min-height:100vh; display:flex; align-items:center; justify-content:center; }

    .login-wrap {
      width: 100%; max-width: 480px; padding: 16px;
      position: relative; z-index: 10;
    }

    .login-card {
      background: rgba(8,8,25,0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      backdrop-filter: blur(30px);
      padding: 40px 36px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 40px rgba(0,212,255,0.06);
      position: relative; overflow: hidden;
    }
    .login-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-purple), transparent);
    }

    .login-logo {
      width: 64px; height: 64px; border-radius: 16px;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; margin: 0 auto 20px;
      box-shadow: 0 0 30px rgba(0,212,255,0.4);
    }
    .login-title {
      text-align: center; font-size: 22px; font-weight: 700;
      color: var(--text-primary); margin-bottom: 4px;
    }
    .login-sub {
      text-align: center; font-size: 13px; color: var(--text-muted); margin-bottom: 32px;
    }

    /* Role selector cards */
    .role-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px;
    }
    .role-card {
      background: rgba(255,255,255,0.03);
      border: 2px solid rgba(255,255,255,0.07);
      border-radius: 12px; padding: 14px 10px;
      text-align: center; cursor: pointer;
      transition: all 0.2s; position: relative;
    }
    .role-card:hover { border-color: rgba(0,212,255,0.3); background: rgba(0,212,255,0.05); }
    .role-card.selected { border-color: var(--neon-blue); background: rgba(0,212,255,0.1); }
    .role-card.selected.hod    { border-color: var(--neon-purple); background: rgba(123,47,255,0.1); }
    .role-card.selected.faculty{ border-color: var(--neon-green);  background: rgba(0,255,136,0.08); }
    .role-card.selected.student{ border-color: var(--neon-yellow); background: rgba(255,204,0,0.08); }

    .role-card input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
    .role-icon {
      font-size: 26px; margin-bottom: 6px; display: block;
      transition: transform 0.2s;
    }
    .role-card:hover .role-icon, .role-card.selected .role-icon { transform: scale(1.15); }
    .role-label { font-size: 13px; font-weight: 600; }

    .role-card[data-role="admin"]   .role-icon { color: var(--neon-blue); }
    .role-card[data-role="hod"]     .role-icon { color: var(--neon-purple); }
    .role-card[data-role="faculty"] .role-icon { color: var(--neon-green); }
    .role-card[data-role="student"] .role-icon { color: var(--neon-yellow); }

    .divider { height: 1px; background: var(--glass-border); margin: 20px 0; }

    .hint-box {
      background: rgba(0,212,255,0.05);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 10px; padding: 12px 14px;
      font-size: 12px; color: var(--text-secondary);
      margin-top: 20px;
    }
    .hint-box .hint-row { display: flex; justify-content: space-between; padding: 3px 0; }
    .hint-box .hint-role { font-weight: 600; }
    .hint-box .hint-creds { color: var(--text-muted); font-family: monospace; }

    .error-msg {
      background: rgba(255,51,102,0.1); border: 1px solid rgba(255,51,102,0.25);
      border-radius: 8px; padding: 10px 14px; font-size: 13px;
      color: var(--neon-red); margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }

    .btn-login {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
      border: none; border-radius: 10px;
      color: #fff; font-size: 14px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.5px;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(0,212,255,0.3);
    }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(0,212,255,0.4); }
    .btn-login:active { transform: translateY(0); }
  </style>
</head>
<body>
<div class="bg-particles" id="bgParticles"></div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo"><i class="bi bi-cpu-fill"></i></div>
    <div class="login-title">Smart Campus</div>
    <div class="login-sub">Digital Twin Platform — Sign in to continue</div>

    {% if error %}
    <div class="error-msg"><i class="bi bi-x-circle-fill"></i> {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login" id="loginForm">
      <!-- Role selector -->
      <div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">Select Role</div>
      <div class="role-grid">
        <label class="role-card" data-role="admin">
          <input type="radio" name="role" value="admin" required>
          <span class="role-icon"><i class="bi bi-shield-fill-check"></i></span>
          <div class="role-label">Admin</div>
        </label>
        <label class="role-card" data-role="hod">
          <input type="radio" name="role" value="hod">
          <span class="role-icon"><i class="bi bi-person-badge-fill"></i></span>
          <div class="role-label">HOD</div>
        </label>
        <label class="role-card" data-role="faculty">
          <input type="radio" name="role" value="faculty">
          <span class="role-icon"><i class="bi bi-mortarboard-fill"></i></span>
          <div class="role-label">Faculty</div>
        </label>
        <label class="role-card" data-role="student">
          <input type="radio" name="role" value="student">
          <span class="role-icon"><i class="bi bi-person-fill"></i></span>
          <div class="role-label">Student</div>
        </label>
      </div>

      <div class="divider"></div>

      <div class="mb-3">
        <label class="cyber-label">Username</label>
        <input type="text" name="username" class="cyber-input" placeholder="Enter username" required autocomplete="username"/>
      </div>
      <div class="mb-4">
        <label class="cyber-label">Password</label>
        <input type="password" name="password" class="cyber-input" placeholder="Enter password" required autocomplete="current-password"/>
      </div>

      <button type="submit" class="btn-login">
        <i class="bi bi-unlock-fill me-2"></i>Sign In
      </button>
    </form>

    <div class="hint-box mt-3">
      <div style="font-size:11px;font-weight:700;color:var(--neon-blue);margin-bottom:8px;letter-spacing:.5px">DEMO CREDENTIALS</div>
      <div class="hint-row"><span class="hint-role" style="color:var(--neon-blue)">Admin</span><span class="hint-creds">admin / admin123</span></div>
      <div class="hint-row"><span class="hint-role" style="color:var(--neon-purple)">HOD</span><span class="hint-creds">hod / hod123</span></div>
      <div class="hint-row"><span class="hint-role" style="color:var(--neon-green)">Faculty</span><span class="hint-creds">faculty / faculty123</span></div>
      <div class="hint-row"><span class="hint-role" style="color:var(--neon-yellow)">Student</span><span class="hint-creds">student / student123</span></div>
    </div>
  </div>
</div>

<script>
// Particles
(function(){
  const c = document.getElementById('bgParticles');
  for(let i=0;i<30;i++){
    const p = document.createElement('div');
    p.className='particle';
    p.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${2+Math.random()*4}px;height:${2+Math.random()*4}px;animation-delay:${Math.random()*8}s;animation-duration:${6+Math.random()*10}s`;
    c.appendChild(p);
  }
})();

// Role card selection
document.querySelectorAll('.role-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected', card.dataset.role);
    card.querySelector('input').checked = true;
    // autofill username hint
    const map = {admin:'admin',hod:'hod',faculty:'faculty',student:'student'};
    document.querySelector('input[name=username]').value = map[card.dataset.role] || '';
    document.querySelector('input[name=password]').value = '';
    document.querySelector('input[name=password]').focus();
  });
});
</script>
</body>
</html>
